let i=0,stats={焦虑:0,后悔:0,内耗:0,社会:0,幸福:0},tags=[],picked=[],shown=[],result=null,rumorAt=[],eventQueue={},pendingEvent=null;
function shuffle(a){for(let j=a.length-1;j>0;j--){let k=Math.floor(Math.random()*(j+1));[a[j],a[k]]=[a[k],a[j]]}return a}
function addEvent(at,kind,event){(eventQueue[at]||(eventQueue[at]=[])).push({kind,event})}
function init(){let keys=Object.keys(rumors).map(Number),count=1+Math.floor(Math.random()*2);while(rumorAt.length<count){let n=keys[Math.floor(Math.random()*keys.length)];if(!rumorAt.includes(n))rumorAt.push(n)}let slots=shuffle(Array.from({length:nodes.length-2},(_,n)=>n+1)),fcount=1+Math.floor(Math.random()*3),lcount=Math.floor(Math.random()*3);shuffle([...farewellEvents]).slice(0,fcount).forEach(e=>addEvent(slots.pop(),"farewell",e));shuffle([...luckyEvents]).slice(0,lcount).forEach(e=>addEvent(slots.pop(),"lucky",e));render()}
function clamp(v){return Math.max(0,Math.min(999,v))}
function nodeNow(){let h=tags.some(x=>["unicorn","sme","home","ordinary","outsourcing","relation_fail","exam_fail","startup_fail","skill_fail","main_fail"].includes(x));return i===4&&tags.includes("public")?publicMidlife:i===4&&tags.includes("stable")?stableMidlife:i===4&&h?hiddenMidlife:nodes[i]}
function meters(){document.getElementById("line").innerHTML=nodes.map((x,n)=>`<i class="dot ${n<=i?"on":""}" data-step="${n+1}">${x[0]}</i>`).join("");document.getElementById("meters").innerHTML=["焦虑","后悔","内耗","社会"].map(k=>`<div class="bar"><span><em>${k}值</em><b>${stats[k]}</b></span><div class="track"><div class="fill" style="width:${stats[k]/9.99}%"></div></div></div>`).join("")}
function render(){meters();let n=nodeNow(),pool=rumors[i]||[],r=rumorAt.includes(i)&&!shown.includes(i)?pool[Math.floor(Math.random()*pool.length)]:null;if(r)shown.push(i);document.getElementById("app").innerHTML=`<div class="card"><div class="top"><div><div class="age">${n[0]} / 节点 ${i+1} of ${nodes.length}</div><h2>${n[1]}</h2><p class="context">${n[2]}</p></div></div>${r?`<div class="rumor"><strong>小道消息卡｜${r[0]}</strong>${r[1]}</div>`:""}${result?"":`<div class="choices">${n.slice(3).map((c,idx)=>`<button class="choice" onclick="choose(${idx})"><b>${String.fromCharCode(65+idx)}. ${c[0]}</b><small>${c[1]}</small><span class="tag">表面收益可见，隐藏风险不可见</span></button>`).join("")}</div>`}${result?`<div class="result">${result}</div><button class="next" onclick="next()">${i===nodes.length-1?"查看人生报告":"进入下一节点"}</button>`:""}</div>`}
function renderEvent(){meters();let p=pendingEvent,e=p.event,good=p.kind==="lucky";document.getElementById("app").innerHTML=`<div class="card"><div class="age">突发事件 / ${good?"幸运小事":"分离与离别"}</div><h2>${e[0]}</h2><p class="context">${e[1]}</p><div class="result">${good?"这一格没有宏大意义，只是生活突然给你递来一点糖。":"这一格没有选项。你无能为力，只能接受。"}</div><button class="next" onclick="acceptEvent()">${good?"收下这一点幸运":"接受这一格"}</button></div>`}
function add(d){for(let j=0;j<d.length;j+=2)stats[d[j]]=clamp((stats[d[j]]||0)+d[j+1])}
function roll(pool){if(pool.some(x=>typeof x[4]==="number")){let total=pool.reduce((a,x)=>a+(x[4]||0),0),r=Math.random()*total;for(let o of pool){r-=o[4]||0;if(r<=0)return o}return pool[pool.length-1]}return Math.random()<.5?pool[0]:pool[1+Math.floor(Math.random()*(pool.length-1))]}
function choose(idx){let n=nodeNow(),c=n[idx+3],table=rollTableNow(n);if(table){let o=roll(table[idx]);add(o[2]);tags.push(o[3]);picked.push(c[0]+" -> "+o[0]);result=o[1];render();return}add(c[2]);tags.push(c[4]);picked.push(c[0]);result=c[3]||"系统正在把你的选择包装成命运。";if(c[4]==="end")finish();else render()}
function acceptEvent(){let p=pendingEvent,e=p.event;add(e[2]);tags.push(e[3]);picked.push((p.kind==="lucky"?"幸运小事":"面对分离与离别")+" -> "+e[0]);pendingEvent=null;result=null;if(eventQueue[i]?.length){pendingEvent=eventQueue[i].shift();renderEvent();return}render()}
function next(){if(i>=nodes.length-1)return finish();i++;result=null;if(eventQueue[i]?.length){pendingEvent=eventQueue[i].shift();renderEvent();return}render()}
function score(){return{anx:stats.焦虑,reg:stats.后悔,inn:stats.内耗,soc:stats.社会,hap:stats.幸福,tags,max:Math.max(stats.焦虑,stats.后悔,stats.内耗,stats.社会)}}
function finish(){meters();let s=score(),e=endings.find(x=>x[2](s))||endings[0];document.getElementById("app").innerHTML=`<div class="card ending"><div class="age">70岁 / 人生报告</div><h2>《${e[0]}》</h2><p class="context">${e[1]}</p><div class="stats">${["焦虑","后悔","内耗","社会","幸福"].map(k=>`<div class="stat"><span>${k}${k==="幸福"?"值":"值"}</span><b>${stats[k]}</b></div>`).join("")}</div><div class="quote">“所谓正确答案，只存在于结果揭晓之后。”</div><div class="report"><h3>可截图人生报告</h3><p>人生称号：${e[0]}<br>核心路径：${picked.slice(0,nodes.length-1).join(" / ")}<br>一句话总结：你没有证明人生可控，只证明了命运很会写黑色幽默。<br><br>这一辈子你过得并不平凡，但我希望你的一辈子，过得平凡顺利。</p></div><button class="restart" onclick="location.reload()">重开一生</button></div>`}
init();
</script>
